name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Никакой сборки, просто копируем файлы в папку dist
      - name: Prepare deployment directory
        run: |
          mkdir dist
          cp -r public/* dist/
          cp -r src dist/
          # Корректируем пути: в dist будет корень сайта
          # Убедимся, что index.html в корне

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages