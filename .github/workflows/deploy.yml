name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Даём права на запись в содержимое репозитория (для gh-pages)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # используем актуальную LTS

      - name: Prepare deployment directory
        run: |
          mkdir dist
          cp -r public/* dist/
          cp -r src dist/
          # Создаём пустой .nojekyll, чтобы GitHub Pages не обрабатывал Jekyll
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true   # создаёт ветку gh-pages заново, избегая конфликтов
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'