name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp manifest.json dist/
          cp sw.js dist/
          cp offline.html dist/
          cp -r src dist/
          # Копируем иконки, если папка существует
          if [ -d "public/icons" ]; then cp -r public/icons dist/icons; fi
          if [ -d "icons" ]; then cp -r icons dist/icons; fi
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true